<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Meow-Chow Clicker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #f5f5f5;
      text-align: center;
    }
    h1 {
      color: #ffcc00;
      margin-top: 40px;
    }
    p {
      font-size: 18px;
    }
    #count {
      font-weight: bold;
      color: #4ec8ff;
    }
    button {
      font-size: 20px;
      padding: 10px 20px;
      margin-top: 20px;
      border-radius: 8px;
      border: none;
      background-color: #4ec8ff;
      color: #111;
      cursor: pointer;
    }
    button:hover {
      background-color: #2ba0d1;
    }
    a {
      color: #ccc;
      display: inline-block;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Meow-Chow Clicker</h1>
  <p>Clicks: <span id="count">0</span></p>
  <button onclick="increment()">Click me!</button>

  <p><a href="index.html">← Back to Home</a></p>

  <script>
    let count = 0;
    function increment() {
      count++;
      document.getElementById('count').textContent = count;
    }
  </script>
</body>
</html>
